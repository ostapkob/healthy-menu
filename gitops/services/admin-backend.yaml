# Admin Backend Service
name: admin-backend
tag: "166"

# Service port
port: 8000
targetPort: 8000

# Vault configuration
vault:
  enabled: true
  role: admin-backend-role
  # Admin нужен доступ только к minio и postgres
  envFromPath: "secret/data/minio,secret/data/postgres"

# Istio configuration
istio:
  enabled: true
  peerAuthentication:
    mode: "PERMISSIVE"
  destinationRule:
    trafficPolicy:
      connectionPool:
        http1MaxPendingRequests: 100
        maxRequestsPerConnection: 100
      outlierDetection:
        consecutive5xxErrors: 5
        interval: "10s"
        baseEjectionTime: "30s"
        maxEjectionPercent: 50
  authorizationPolicy:
    allowInternal: true
