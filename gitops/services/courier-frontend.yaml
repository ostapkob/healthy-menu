# Courier Frontend Service
name: courier-frontend
tag: "145"

# Service port
port: 80
targetPort: 80

# Vault configuration (frontend не требует доступа к секретам)
vault:
  enabled: false

# Istio configuration
istio:
  enabled: true
  peerAuthentication:
    mode: "PERMISSIVE"
  authorizationPolicy:
    allowInternal: false
