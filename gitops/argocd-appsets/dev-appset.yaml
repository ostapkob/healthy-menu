apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: healthy-menu-dev
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: http://gitlab:8060/ostapkob/gitops.git
      revision: master
      files:
      - path: "services/*.yaml"
  template:
    metadata:
      name: "{{name}}"
    spec:
      project: default
      source:
        repoURL: http://gitlab:8060/ostapkob/infra.git
        targetRevision: master
        path: .
        helm:
          releaseName: "{{name}}"
          parameters:
          # Базовые параметры
          - name: image.tag
            value: "{{tag}}"
          - name: service.port
            value: "{{port}}"
          - name: service.targetPort
            value: "{{targetPort}}"
          - name: imagePullSecretName
            value: "nexus-creds"
          # Vault - просто список сервисов
          - name: vault.enabled
            value: "{{vault.enabled}}"
          - name: vault.role
            value: "{{vault.role}}"
          - name: vault.envFromPath
            value: "{{vault.envFromPath}}"

          # Istio
          - name: istio.enabled
            value: "{{istio.enabled}}"
          - name: istio.peerAuthentication.mode
            value: "{{istio.peerAuthentication.mode}}"
          - name: istio.authorizationPolicy.allowInternal
            value: "{{istio.authorizationPolicy.allowInternal}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: healthy-menu-dev
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
