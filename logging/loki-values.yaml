# Loki Helm values для healthy-menu-dev
# Исправленная конфигурация с auth_enabled=true

# Режим развертывания - Single Binary для dev окружения
deploymentMode: SingleBinary

# Репликация
loki:
  # Включаем multi-tenancy
  auth_enabled: true
  
  commonConfig:
    replication_factor: 1
  
  # Схема хранения
  schemaConfig:
    configs:
      - from: "2020-10-24"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  
  # Конфигурация storage
  storage:
    type: filesystem
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin
  
  # Лимиты
  limits_config:
    retention_period: 168h  # 7 дней
    allow_structured_metadata: false
    volume_enabled: true
  
  # Pattern ingester
  pattern_ingester:
    enabled: false
  
  # Ruler - отключаем для упрощения
  ruler:
    enable_api: false
    alertmanager_url: ""

# Отключаем MinIO (используем filesystem)
minio:
  enabled: false

# Single Binary реплики
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 2Gi  # Уменьшили с 10Gi до 2Gi для экономии памяти
    storageClass: null
    accessModes:
      - ReadWriteOnce
  resources:
    requests:
      cpu: 100m
      memory: 256Mi  # Уменьшили для экономии памяти
    limits:
      cpu: 500m
      memory: 512Mi

# Отключаем кэш компоненты для экономии памяти
chunksCache:
  enabled: false

resultsCache:
  enabled: false

# Отключаем лишние компоненты для single binary
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

# Gateway для доступа к Loki
gateway:
  enabled: true
  replicas: 1
  ingress:
    enabled: false

# Monitoring
monitoring:
  dashboards:
    enabled: false
  rules:
    alerting: false
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

# Test
test:
  enabled: false

# ServiceAccount
serviceAccount:
  create: true
  name: loki
