                    "uid": "loki"
                  },
                  "editorMode": "code",
                  "expr": "sum(count_over_time({namespace=\"healthy-menu-dev\", app=~\".*-backend\"} | json | level=\"info\" [$__range]))",
                  "legendFormat": "Info",
                  "queryType": "range",
                  "refId": "A"
                }
              ],
              "title": "Всего Info",
              "type": "stat"
            },
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "gridPos": {
                "h": 8,
                "w": 8,
                "x": 16,
                "y": 18
              },
              "id": 6,
              "options": {
                "colorMode": "value",
                "graphMode": "area",
                "justifyMode": "auto",
                "orientation": "auto",
                "reduceOptions": {
                  "calcs": ["lastNotNull"],
                  "fields": "",
                  "values": false
                },
                "textMode": "auto"
              },
              "targets": [
                {
                  "datasource": {
                    "type": "loki",
                    "uid": "loki"
                  },
                  "editorMode": "code",
                  "expr": "sum(count_over_time({namespace=\"healthy-menu-dev\", app=~\".*-backend\"} [$__range]))",
                  "legendFormat": "Total",
                  "queryType": "range",
                  "refId": "A"
                }
              ],
              "title": "Всего логов",
              "type": "stat"
            },
            {
              "datasource": {
