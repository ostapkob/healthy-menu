          "uid": "healthy-menu-logs",
          "version": 1,
          "weekStart": ""
        }

# Дополнительные volume mounts
extraMounts: []
extraVolumes: []

# Sidecar контейнеры
sidecar:
  dashboards:
    enabled: false
  datasources:
    enabled: false

# Init containers
initContainers: []

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Security Context
securityContext:
  fsGroup: 472

# Container Security Context
containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472

# Node Selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Test
test:
  enabled: false
