          ],
          "refresh": "10s",
          "schemaVersion": 38,
          "style": "dark",
          "tags": ["healthy-menu", "logs"],
          "templating": {
            "list": [
              {
                "current": {},
                "datasource": {
                  "type": "loki",
                  "uid": "loki"
                },
                "definition": "label_values({namespace=\"healthy-menu-dev\"}, app)",
                "hide": 0,
                "includeAll": true,
                "label": "Сервис",
                "multi": true,
                "name": "app",
                "options": [],
                "query": "label_values({namespace=\"healthy-menu-dev\"}, app)",
                "refresh": 2,
                "regex": ".*-backend",
                "skipUrlSync": false,
                "sort": 0,
                "type": "query"
              },
              {
                "current": {},
                "datasource": {
                  "type": "loki",
                  "uid": "loki"
                },
                "definition": "label_values({namespace=\"healthy-menu-dev\", app=~\"$app\"}, level)",
                "hide": 0,
                "includeAll": true,
