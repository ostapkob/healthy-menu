apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-vault
  namespace: healthy-menu-dev
  labels:
    app: test-vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-vault
  template:
    metadata:
      labels:
        app: test-vault
      annotations:
        vault.security.banzaicloud.io/vault-addr: "http://vault.vault.svc:8200"
        vault.security.banzaicloud.io/vault-skip-verify: "true"
        vault.security.banzaicloud.io/vault-auth-method: "kubernetes"
        vault.security.banzaicloud.io/vault-role: "backend-role"
        vault.security.banzaicloud.io/vault-serviceaccount: "admin-backend"
    spec:
      serviceAccountName: admin-backend
      imagePullSecrets:
        - name: nexus-creds
      containers:
      - name: test-vault
        image: nexus:5000/debug-env:latest
        imagePullPolicy: Always
        command:
          - sh
          - -c
          - |
            echo "=== ТЕСТ VAULT ENV ==="
            echo "MINIO_HOST=$MINIO_HOST"
            echo "MINIO_PORT=$MINIO_PORT"
            echo "MINIO_ROOT_USER=$MINIO_ROOT_USER"
            echo "MINIO_ROOT_PASSWORD=$MINIO_ROOT_PASSWORD"
            echo "POSTGRES_HOST=$POSTGRES_HOST"
            echo "POSTGRES_USER=$POSTGRES_USER"
            echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD"
            echo "KAFKA_BOOTSTRAP_SERVERS=$KAFKA_BOOTSTRAP_SERVERS"
            echo "JWT_SECRET=$JWT_SECRET"
            echo "=== КОНЕЦ ТЕСТА ==="
            sleep 3600
        env:
        # MinIO
        - name: MINIO_HOST
        - name: MINIO_PORT
        - name: MINIO_ROOT_USER
        - name: MINIO_ROOT_PASSWORD
        - name: MINIO_BUCKET
        - name: MINIO_URL

        # PostgreSQL
        - name: POSTGRES_HOST
        - name: POSTGRES_PORT
        - name: POSTGRES_USER
        - name: POSTGRES_PASSWORD
        - name: POSTGRES_DB

        # Kafka
        - name: KAFKA_BOOTSTRAP_SERVERS

        # JWT
        - name: JWT_SECRET
