{{- if and .Values.vault.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
  annotations:
    vault.security.banzaicloud.io/vault-addr: "{{ .Values.vault.addr }}"
    vault.security.banzaicloud.io/vault-skip-verify: "{{ .Values.vault.skipVerify }}"
    vault.security.banzaicloud.io/vault-path: "{{ .Values.vault.authPath }}"
    vault.security.banzaicloud.io/vault-role: "{{ .Values.vault.role }}"
    vault.security.banzaicloud.io/vault-serviceaccount: "{{ .Release.Name }}"
    vault.security.banzaicloud.io/vault-env-from-path: "{{ .Values.vault.envFromPath }}"
    vault.security.banzaicloud.io/vault-auth-method: "{{ .Values.vault.vaultAuthMethod }}"
data:
  MINIO_HOST: vault:secret/data/minio#MINIO_HOST
  MINIO_URL: vault:secret/data/minio#MINIO_URL
  MINIO_PORT: vault:secret/data/minio#MINIO_PORT
  MINIO_BUCKET: vault:secret/data/minio#MINIO_BUCKET
  POSTGRES_DATABASE_TEST_URL: vault:secret/data/postgres#POSTGRES_DATABASE_TEST_URL
  POSTGRES_DATABASE_URL: vault:secret/data/postgres#POSTGRES_DATABASE_URL
  POSTGRES_DB: vault:secret/data/postgres#POSTGRES_DB
  POSTGRES_HOST: vault:secret/data/postgres#POSTGRES_HOST
  POSTGRES_PORT: vault:secret/data/postgres#POSTGRES_PORT
  KAFKA_ADVERTISED_LISTENERS: vault:secret/data/kafka#KAFKA_ADVERTISED_LISTENERS
  KAFKA_BOOTSTRAP_SERVERS: vault:secret/data/kafka#KAFKA_BOOTSTRAP_SERVERS
  KAFKA_ZOOKEEPER_CONNECT: vault:secret/data/kafka#KAFKA_ZOOKEEPER_CONNECT
{{- end }}
