# Реплики
replicaCount: 1

# Namespace (по умолчанию берётся из Helm release)

# Образ
image:
  repository: nexus:5000
  tag: "latest"
  pullPolicy: Always

# Порт приложения
service:
  protocol: TCP
  port: 8000
  targetPort: 8000
  type: ClusterIP

# Command (опционально)
# command: ["sh", "-c", "echo Hello && sleep 3600"]

# Vault конфигурация
vault:
  enabled: true

  # Настройки подключения к Vault
  addr: "http://vault.vault.svc:8200"
  skipVerify: "true"
  authPath: "kubernetes"
  
  # Роль Vault для Kubernetes auth
  role: "backend-role"
  
  # Пути к секретам в Vault (список через запятую)
  # Vault Agent Injector прочитает ВСЕ переменные из указанных путей
  envFromPath: "secret/data/minio,secret/data/postgres,secret/data/kafka"
  
  # Метод аутентификации
  vaultAuthMethod: kubernetes

# Docker registry credentials
imagePullSecretName: "nexus-creds"

# Дополнительные переменные окружения (опционально)
env: []

# Istio конфигурация
istio:
  enabled: false
  peerAuthentication:
    mode: "PERMISSIVE"
  destinationRule:
    trafficPolicy:
      connectionPool:
        http1MaxPendingRequests: 100
        maxRequestsPerConnection: 100
      outlierDetection:
        consecutive5xxErrors: 5
        interval: "10s"
        baseEjectionTime: "30s"
        maxEjectionPercent: 50
  authorizationPolicy:
    allowInternal: true
